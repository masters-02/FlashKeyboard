name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # v3 වෙනුවට v4 කළා

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # v3 වෙනුවට v4 කළා
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # v3 වෙනුවට v4 කළා
        with:
          name: FlashKeyboard-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
