name: Build Android APK

on:
  push:
    branches: [ "main" ] # ඔයාගේ main branch එකට push කරන හැම වෙලාවකම වැඩ කරයි

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Android Release APK
        run: |
          # මෙතන 'cd' එක පරීක්ෂා කරන්න. ඔයාගේ android folder එක තියෙන තැනට යන්න ඕනේ.
          # ඔයාගේ screen එකේ විදිහට FlashKeyboard/android වෙන්න ඇති තියෙන්නේ.
          cd FlashKeyboard/android && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-debug.apk
          path: FlashKeyboard/android/app/build/outputs/apk/debug/app-debug.apk
